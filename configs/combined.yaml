# ============================================================
# Combined dataset (CIFAR-10 + Chars74K) experiment.
#
# Two sources:
#   1. CIFAR-10 from torchvision: natural object images (10 classes).
#      Always available, no auth required.
#   2. Chars74K from local data/chars74k/ -- run
#         python scripts/download_chars74k.py --subset fnt --max_images 200
#      first (one-time, ~51 MB).  Default subset `fnt` (computer fonts)
#      is the cleanest because every character is upright by construction.
#      Alternative subsets:
#         --subset img    natural-scene crops (~7.7K imgs)
#         --subset hnd    tablet handwriting (~3.4K imgs)
#
# Fallback if Chars74K download fails (Google Drive quota, etc.):
#   replace the second entry below with:
#     - source: "torchvision"
#       name: "emnist"
#       split: "train"
#       num_images: 100
#       options: {emnist_split: "byclass"}
# EMNIST is OOD for Qwen2-VL though, so reward will be noisier.
# ============================================================

experiment:
  name: "canon_ppo_combined"
  seed: 42
  output_dir: "checkpoints"
  log_dir: "logs"

# ------------------------------------------------------------
# Combined dataset. The training pool is concatenated and shuffled
# across sub-sources, so a single rollout sees a mix of CIFAR objects
# and characters.
# ------------------------------------------------------------
data:
  dir: "data"                       # cache dir for sub-sources
  image_size: 224                   # canvas the policy + VLM see
  init_rot_max: 90.0
  combined:
    - source: "torchvision"
      name: "cifar10"
      split: "train"
      num_images: 100
    - source: "dir"
      path: "data/chars74k"
      num_images: 100

action:
  bound: 5
  step_size: 1

env:
  num_envs: 16
  rollout_steps: 32
  max_episode_steps: 64
  early_terminate:
    enabled: true
    reward_threshold: 0.85
    consecutive_steps: 6
  reward_normalization: true

# ------------------------------------------------------------
# Policy: ~87M (DINOv2-base) trainable heads only when frozen.
# ------------------------------------------------------------
policy:
  backbone: "facebook/dinov2-base"
  freeze_backbone: true
  hidden_dim: 512
  dropout: 0.1
  dtype: "float32"

# ------------------------------------------------------------
# Reward: Qwen2-VL-2B (the BIG VLM, used only during training).
# ------------------------------------------------------------
reward:
  type: "vlm"
  vlm:
    model_name: "Qwen/Qwen2-VL-2B-Instruct"
    dtype: "float16"
    device: "cuda"
    yes_token: "Yes"
    no_token: "No"
    batch_size: 16
    prompts:
      - text: "Is this image displayed in its natural, correct upright orientation? Answer with only Yes or No."
        sign: 1.0
      - text: "Is this image rotated away from its natural upright orientation? Answer with only Yes or No."
        sign: -1.0
      - text: "Is the top of the scene at the top of this image? Answer with only Yes or No."
        sign: 1.0
    calibrate: true
    calibration_clip: 0.95
  siglip:
    model_name: "google/siglip-large-patch16-384"
    dtype: "float16"
    device: "cuda"
    upright_prompts: ["a natural upright photograph", "a correctly oriented photo"]
    rotated_prompts: ["a rotated photograph", "an upside down photo", "a sideways photo"]
  synthetic:
    use_cosine: true

ppo:
  total_updates: 300
  ppo_epochs: 3
  minibatch_size: 64
  clip_range: 0.2
  clip_range_vf: null
  vf_coef: 0.5
  entropy_coef: 0.01
  max_grad_norm: 0.5
  gamma: 0.99
  gae_lambda: 0.95
  learning_rate: 1.0e-4
  lr_schedule: "linear"
  target_kl: 0.04
  # ----------------------------------------------------------------
  # Reward shaping (training-time only).
  #   cos_alpha       : weight on cos(angle), gives a *smooth* gradient
  #                     even when the VLM tanh saturates near upright.
  #   progress_beta   : weight on max(0, |angle_{t-1}| - |angle_t|),
  #                     a per-step reward for *reducing* absolute angle
  #                     -- direction-aware, supplies signal the VLM
  #                     can't (the VLM doesn't know "which way").
  #   vlm_score_every : call the VLM every N steps, cache between
  #                     (1 = call every step).  N=2 halves the rollout
  #                     wall time at modest variance cost.
  # Test-time canonicalization always uses the raw VLM reward
  # (no shaping); shaping is purely a training accelerator.
  # ----------------------------------------------------------------
  shaping:
    cos_alpha: 0.10
    progress_beta: 0.05
    vlm_score_every: 1

logging:
  log_every: 1
  save_every: 25
  eval_every: 25
  num_eval_episodes: 8
  tensorboard: true

# ------------------------------------------------------------
# Test-time inference. Two stopping criteria are supported and
# either one fires per env (see src/evaluate.py::canonicalize):
#   1. |r_t - r_{t-1}| < tolerance for `patience` consecutive steps.
#   2. r_t >= reward_threshold for `threshold_patience` steps.
# ------------------------------------------------------------
inference:
  tolerance: 0.005
  patience: 50
  reward_threshold: 0.85          # set null to disable threshold-based stop
  threshold_patience: 5
  max_steps: 200
  greedy: true
